<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Calculator</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">
            Calculator Web Application
        </h2>

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    First Number
                </label>

                <input
                    type="number"
                    name="num1"
                    class="form-control"
                    placeholder="Enter first number"
                    value="{{ request.form.get('num1', '') }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Second Number
                </label>

                <input
                    type="number"
                    name="num2"
                    class="form-control"
                    placeholder="Enter second number"
                    value="{{ request.form.get('num2', '') }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Operation
                </label>

                <select name="operation" class="form-select">

                    <option value="add"
                        {% if request.form.get('operation') == 'add' %}selected{% endif %}>
                        Addition
                    </option>

                    <option value="subtract"
                        {% if request.form.get('operation') == 'subtract' %}selected{% endif %}>
                        Subtraction
                    </option>

                    <option value="multiply"
                        {% if request.form.get('operation') == 'multiply' %}selected{% endif %}>
                        Multiplication
                    </option>

                    <option value="divide"
                        {% if request.form.get('operation') == 'divide' %}selected{% endif %}>
                        Division
                    </option>

                    <option value="percentage"
                        {% if request.form.get('operation') == 'percentage' %}selected{% endif %}>
                        Percentage
                    </option>

                </select>

            </div>

            <button
                type="submit"
                class="btn btn-primary w-100">
                Calculate
            </button>

            <div class="d-grid gap-2 mt-2">

                <a href="/" class="btn btn-secondary">
                    Clear
                </a>

            </div>

            <hr>

            {% if result is not none %}

            <div class="alert alert-success mt-3">
                <strong>Result:</strong> {{ result }}
            </div>

            {% endif %}

            {% if error %}

            <div class="alert alert-danger mt-3">
                {{ error }}
            </div>

            {% endif %}

        </form>

    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
